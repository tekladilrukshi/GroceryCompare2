name: Web (React SPA)

on:
  push:
    branches: [main]
    paths:
      - "src/GroceryCompare.Web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/GroceryCompare.Web/**"
      - ".github/workflows/web.yml"

defaults:
  run:
    working-directory: src/GroceryCompare.Web

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/GroceryCompare.Web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
